name: Vitakruid UPDATE-feed Updater

on:
  schedule:
    - cron: "0 6,18 * * *"   # 2x per dag
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Dependencies
        run: pip install -r requirements.txt
      - name: UPDATE-feed scraper
        run: python scraper.py
      - name: Committen en pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vitakruid_feed.xml
          git diff --staged --quiet || git commit -m "🔄 Vitakruid UPDATE-feed: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
